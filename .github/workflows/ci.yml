name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }} (build + test)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential python3-dev

      - name: Install CPU-only PyTorch
        # Avoids pulling the large CUDA wheels on CI runners.
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install NeuCoDe (editable) with dev extras
        run: pip install -e ".[dev]"

      - name: Run test suite
        run: pytest -v

  import-smoke:
    name: Open-core import (no proprietary Akida SDK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: sudo apt-get update && sudo apt-get install -y build-essential python3-dev
      - run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Install core only (no extras)
        run: pip install -e .
      - name: Assert import works and Akida SDK is absent
        run: |
          python - <<'PY'
          import importlib.util, sys
          import neucode  # must import without any optional extra
          assert importlib.util.find_spec("akida") is None, "akida should NOT be installed for the core smoke test"
          print("neucode imported cleanly without the proprietary Akida SDK")
          PY

  c-core:
    name: C simulation core (make run-tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Build and run C test suite
        run: make run-tests

  package:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: sudo apt-get update && sudo apt-get install -y build-essential python3-dev
      - run: pip install build twine
      - name: Build distributions
        run: python -m build
      - name: Check metadata
        run: twine check dist/*
