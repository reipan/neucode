; NeuCoDe firmware - STM32G431RB + SimpleFOC (PlatformIO / STM32Duino)
; Board: NUCLEO-G431RB + X-NUCLEO-IHM16M1 (STSPIN830) + MT6701 (ADC)
;
; Shared firmware source lives in firmware/ and is compiled via
; build_src_filter. Only the platform-specific actuator, sensor, and
; comm port files live in src/ (replacing the CubeIDE equivalents).

[env:nucleo_g431rb]
platform  = ststm32
board     = nucleo_g431rb
framework = arduino

lib_deps =
    askuric/Simple FOC @ ^2.3.4

; Copy *_default.h stubs when generated model headers are missing (see pre_build.py).
; Allows building from a clean clone without running the ML training pipeline.
extra_scripts = pre:pre_build.py

; -I paths are relative to this file's directory (../../ resolves to firmware/)
build_flags =
    -I../../loop
    -I../../comm
    -I../../setpoint
    -I../../sensor
    -I../../actuator
    -I../../controller
    -I../../controller/pid
    -I../../controller/ann
    -I../../controller/snn
    -I../../controller/external
    -I../../helper
    -I../../platforms/arduino/actuator
    -I../../platforms/arduino/sensor
    -I../../platforms/arduino/comm
    -I../../platforms/arduino/helper
    -I../../platforms/stm32/external
    -I../../../neucode/c_src/include
    -Wl,-u,_printf_float
    -Wl,-u,_scanf_float
    ; Firmware anti-stiction for ANN mode (PD-teacher has no integral).
    ; SNN learns integral behavior from the teacher, so anti-stiction is not needed.
    -DNC_ANTI_STICTION=0

; Paths are relative to src_dir (src/), so ../../../ resolves to firmware/
build_src_filter =
    +<*.cpp>
    +<*.c>
    +<../../../platforms/arduino/actuator/*.cpp>
    +<../../../platforms/arduino/sensor/*.cpp>
    +<../../../platforms/arduino/comm/*.cpp>
    +<../../../platforms/arduino/helper/*.cpp>
    +<../../../loop/loop.c>
    +<../../../comm/comm.c>
    +<../../../comm/cmd_handler.c>
    +<../../../setpoint/setpoint.c>
    +<../../../sensor/sensor.c>
    +<../../../actuator/actuator.c>
    +<../../../controller/controller.c>
    +<../../../controller/controller_types.c>
    +<../../../controller/pid/pid_adapter.c>
    +<../../../controller/ann/ann.c>
    +<../../../controller/ann/inference.c>
    +<../../../controller/snn/snn.c>
    +<../../../controller/snn/snn_inference.c>
    +<../../../controller/external/external.c>
    +<../../../platforms/stm32/external/stm32_ext_spi.c>
    +<../../../../neucode/c_src/src/pid.c>

; Upload via ST-Link on NUCLEO
upload_protocol = stlink
debug_tool      = stlink

monitor_speed   = 115200

